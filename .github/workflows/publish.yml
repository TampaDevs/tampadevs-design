name: "Publish Packages"

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (don't actually publish)"
        required: false
        default: false
        type: boolean

concurrency:
  group: publish-packages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build and test
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, 'v')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Run tests
        run: pnpm test

      - name: Generate version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="0.$(date -u +'%Y%m%d.%H%M')"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing version: $VERSION"

      - name: Update package versions
        run: |
          for pkg in packages/*/package.json; do
            jq --arg v "${{ steps.version.outputs.version }}" '.version = $v' "$pkg" > tmp.json
            mv tmp.json "$pkg"
          done

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: packages/

  publish-npm:
    runs-on: ubuntu-latest
    name: Publish to npm
    needs: build
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: packages
          path: packages/

      - name: Setup Node.js for npm
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Publish packages (dry run)
        if: inputs.dry_run == true
        run: |
          cd packages/tokens && npm publish --access public --dry-run
          cd ../react && npm publish --access public --dry-run
          cd ../tailwind-preset && npm publish --access public --dry-run

      - name: Publish packages
        if: inputs.dry_run != true
        run: |
          cd packages/tokens && npm publish --access public
          cd ../react && npm publish --access public
          cd ../tailwind-preset && npm publish --access public

  publish-github:
    runs-on: ubuntu-latest
    name: Publish to GitHub Packages
    needs: build
    permissions:
      contents: read
      packages: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: packages
          path: packages/

      - name: Setup Node.js for GitHub Packages
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://npm.pkg.github.com"
          scope: "@tampadevs"

      - name: Publish packages (dry run)
        if: inputs.dry_run == true
        run: |
          cd packages/tokens && pnpm publish --no-git-checks --dry-run || true
          cd ../react && pnpm publish --no-git-checks --dry-run || true
          cd ../tailwind-preset && pnpm publish --no-git-checks --dry-run || true

      - name: Publish packages
        if: inputs.dry_run != true
        run: |
          cd packages/tokens && pnpm publish --no-git-checks || true
          cd ../react && pnpm publish --no-git-checks || true
          cd ../tailwind-preset && pnpm publish --no-git-checks || true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
